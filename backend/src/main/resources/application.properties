# ApiShift Backend Configuration
quarkus.application.name=apishift-backend
quarkus.http.port=8080
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
%dev.quarkus.http.cors.origins=*

# Kubernetes Client (in-cluster auto-detected, or manual for dev)
quarkus.kubernetes-client.trust-certs=true
quarkus.kubernetes-client.devservices.enabled=false
# When running outside a cluster, set these:
# quarkus.kubernetes-client.master-url=
# quarkus.kubernetes-client.token=

# 3scale Admin API
apishift.threescale.admin-url=${THREESCALE_ADMIN_URL:http://localhost}
apishift.threescale.access-token=${THREESCALE_ACCESS_TOKEN:none}
apishift.threescale.crd-discovery=${THREESCALE_CRD_DISCOVERY:true}

# AI / LLM Configuration (OpenAI-compatible via LiteLLM)
quarkus.langchain4j.openai.base-url=${AI_ENDPOINT:https://litellm-prod.apps.maas.redhatworkshops.io/v1}
quarkus.langchain4j.openai.api-key=${AI_API_KEY:dummy}
quarkus.langchain4j.openai.chat-model.model-name=${AI_MODEL:deepseek-r1-distill-qwen-14b}
quarkus.langchain4j.openai.chat-model.temperature=0.3
quarkus.langchain4j.openai.chat-model.max-tokens=4096
quarkus.langchain4j.openai.timeout=${AI_TIMEOUT:600s}
quarkus.langchain4j.openai.log-requests=true
quarkus.langchain4j.openai.log-responses=true

# Connectivity Link defaults
apishift.connectivity-link.target-namespace=${CL_TARGET_NAMESPACE:kuadrant-system}
apishift.connectivity-link.gateway-strategy=${CL_GATEWAY_STRATEGY:shared}
apishift.connectivity-link.gateway-class-name=${CL_GATEWAY_CLASS:istio}
apishift.cluster-domain=${CLUSTER_DOMAIN:apps.cluster.example.com}

# Developer Hub integration (disabled by default)
apishift.developer-hub.enabled=${DEVELOPER_HUB_ENABLED:false}
apishift.developer-hub.url=${DEVELOPER_HUB_URL:none}
apishift.developer-hub.scaffolder-url=${DEVHUB_SCAFFOLDER_URL:}
apishift.developer-hub.scaffolder-token=${DEVHUB_SCAFFOLDER_TOKEN:}
apishift.developer-hub.component-suffix=${DEVHUB_COMPONENT_SUFFIX:-product}

# Multi-source 3scale (JSON array, e.g. [{"id":"prod","label":"Prod 3scale","adminUrl":"...","accessToken":"...","enabled":true}])
apishift.threescale.sources=${THREESCALE_SOURCES:}

# Multi-cluster targets (JSON array, e.g. [{"id":"staging","label":"Staging","apiServerUrl":"...","token":"...","authType":"token","verifySsl":false,"enabled":true}])
apishift.target-clusters=${TARGET_CLUSTERS:}
apishift.argocd.cluster-discovery=${ARGOCD_CLUSTER_DISCOVERY:false}

# APICast Discovery
apishift.apicast.discovery=${APICAST_DISCOVERY:true}

# kuadrantctl
apishift.kuadrantctl.path=${KUADRANTCTL_PATH:/usr/local/bin/kuadrantctl}

# PostgreSQL persistence
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5432/apishift}
quarkus.datasource.username=${DATASOURCE_USERNAME:apishift}
quarkus.datasource.password=${DATASOURCE_PASSWORD:apishift}
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway migrations
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
quarkus.flyway.locations=classpath:db/migration

# Data Grid / Infinispan cache
quarkus.infinispan-client.hosts=${DATAGRID_HOST:apishift-datagrid}:${DATAGRID_PORT:11222}
quarkus.infinispan-client.username=${DATAGRID_USERNAME:developer}
quarkus.infinispan-client.password=${DATAGRID_PASSWORD:changeme}
quarkus.infinispan-client.client-intelligence=BASIC
quarkus.infinispan-client.devservices.enabled=false
quarkus.infinispan-client.health.enabled=false
apishift.cache.ttl-seconds=${CACHE_TTL_SECONDS:3600}

# Logging
quarkus.log.level=INFO
quarkus.log.category."io.apishift".level=DEBUG
quarkus.log.category."org.hibernate".level=WARN
%prod.quarkus.log.console.json=true
%prod.quarkus.log.console.async=true
%prod.quarkus.log.console.async.queue-length=512

# Health checks
quarkus.smallrye-health.ui.always-include=true

# Observability (optional)
apishift.observability.enabled=${OBSERVABILITY_ENABLED:false}

# OpenTelemetry (active only when observability is enabled)
quarkus.otel.enabled=${OTEL_ENABLED:false}
quarkus.otel.exporter.otlp.endpoint=${OTEL_ENDPOINT:http://localhost:4317}
quarkus.otel.resource.attributes=service.name=apishift-backend

# OpenShift deployment
quarkus.openshift.route.expose=true
quarkus.container-image.group=everythingascode
quarkus.container-image.name=apishift-backend

# OpenAPI (schema written to backend/openapi/ during compile; synced to frontend via scripts)
quarkus.smallrye-openapi.path=/q/openapi
quarkus.smallrye-openapi.store-schema-directory=openapi
quarkus.smallrye-openapi.info-title=ApiShift API
quarkus.smallrye-openapi.info-version=0.3.0
quarkus.smallrye-openapi.info-description=3scale to Connectivity Link migration console REST API
mp.openapi.extensions.smallrye.operationIdStrategy=METHOD
