name: Frontend tests

# Manual/debug only — PR and main pushes use pr-check.yml (Build & Verify).
on:
  workflow_dispatch:

concurrency:
  group: frontend-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Install dependencies
        run: npm ci

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Verify OpenAPI types are in sync
        run: |
          npm run generate:api
          cd ..
          git diff --exit-code -- \
            backend/openapi/ \
            frontend/openapi/ \
            frontend/src/app/core/api/generated/

      - name: Run frontend unit tests
        run: |
          RETRY_ATTEMPTS=2 RETRY_SLEEP_SECONDS=15 ../scripts/ci/retry.sh \
            npm test -- --no-watch --browsers=ChromeHeadlessCI

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage-report
          path: frontend/coverage/frontend/
          if-no-files-found: warn
