name: Build and push to Quay.io

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  QUAY_REGISTRY: quay.io
  QUAY_NAMESPACE: everythingascode

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve application version
        run: |
          source scripts/lib/version.sh
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.QUAY_REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Login to registry.access.redhat.com
        uses: docker/login-action@v3
        with:
          registry: registry.access.redhat.com
          username: ${{ secrets.REDHAT_REGISTRY_USERNAME }}
          password: ${{ secrets.REDHAT_REGISTRY_PASSWORD }}

      - name: Login to registry.redhat.io
        uses: docker/login-action@v3
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REDHAT_REGISTRY_USERNAME }}
          password: ${{ secrets.REDHAT_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push apishift-backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.jvm
          push: true
          tags: |
            ${{ env.QUAY_REGISTRY }}/${{ env.QUAY_NAMESPACE }}/apishift-backend:latest
            ${{ env.QUAY_REGISTRY }}/${{ env.QUAY_NAMESPACE }}/apishift-backend:${{ github.sha }}

      - name: Build and push apishift-frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.ci
          push: true
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
          tags: |
            ${{ env.QUAY_REGISTRY }}/${{ env.QUAY_NAMESPACE }}/apishift-frontend:latest
            ${{ env.QUAY_REGISTRY }}/${{ env.QUAY_NAMESPACE }}/apishift-frontend:${{ github.sha }}

      - name: Build and push apishift-devhub-plugin
        uses: docker/build-push-action@v6
        with:
          context: ./gateforge-devhub-plugin
          file: ./gateforge-devhub-plugin/Dockerfile
          push: true
          tags: |
            ${{ env.QUAY_REGISTRY }}/${{ env.QUAY_NAMESPACE }}/apishift-devhub-plugin:latest
            ${{ env.QUAY_REGISTRY }}/${{ env.QUAY_NAMESPACE }}/apishift-devhub-plugin:${{ github.sha }}

      - name: Build and push apishift-devhub-frontend-plugin
        uses: docker/build-push-action@v6
        with:
          context: ./gateforge-devhub-frontend
          file: ./gateforge-devhub-frontend/Dockerfile
          push: true
          tags: |
            ${{ env.QUAY_REGISTRY }}/${{ env.QUAY_NAMESPACE }}/apishift-devhub-frontend-plugin:latest
            ${{ env.QUAY_REGISTRY }}/${{ env.QUAY_NAMESPACE }}/apishift-devhub-frontend-plugin:${{ github.sha }}
