name: Backend tests

# Manual/debug only — PR and main pushes use pr-check.yml (Build & Verify).
on:
  workflow_dispatch:

concurrency:
  group: backend-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Verify export-minimal fixture
        run: ../scripts/ci/verify-export-minimal-fixture.sh

      - name: Export OpenAPI schema
        run: |
          RETRY_ATTEMPTS=2 RETRY_SLEEP_SECONDS=20 ../scripts/ci/retry.sh \
            mvn -q -Dtest=OpenApiBuildTest test

      - name: Run backend unit tests
        run: |
          RETRY_ATTEMPTS=2 RETRY_SLEEP_SECONDS=20 ../scripts/ci/retry.sh mvn verify

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: backend/target/site/jacoco/
          if-no-files-found: warn
