name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  QUAY_REGISTRY: quay.io
  QUAY_NAMESPACE: everythingascode

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: apishift-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile.jvm
            needs-version: false
          - image: apishift-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile.ci
            needs-version: true
          - image: apishift-devhub-plugin
            context: ./gateforge-devhub-plugin
            dockerfile: ./gateforge-devhub-plugin/Dockerfile
            needs-version: false
          - image: apishift-devhub-frontend-plugin
            context: ./gateforge-devhub-frontend
            dockerfile: ./gateforge-devhub-frontend/Dockerfile
            needs-version: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release version
        run: |
          source scripts/lib/version.sh
          if [ "${{ github.event_name }}" = "push" ]; then
            REF_TAG="${GITHUB_REF_NAME}"
            TAG_VER="${REF_TAG#v}"
            if [ "$TAG_VER" != "$VERSION" ]; then
              echo "Git tag ${REF_TAG} does not match Chart.yaml version ${VERSION}"
              exit 1
            fi
            echo "RELEASE_TAG=${REF_TAG}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${VERSION_V}" >> "$GITHUB_ENV"
          fi
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.QUAY_REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Login to registry.access.redhat.com
        uses: docker/login-action@v3
        with:
          registry: registry.access.redhat.com
          username: ${{ secrets.REDHAT_REGISTRY_USERNAME }}
          password: ${{ secrets.REDHAT_REGISTRY_PASSWORD }}

      - name: Login to registry.redhat.io
        uses: docker/login-action@v3
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REDHAT_REGISTRY_USERNAME }}
          password: ${{ secrets.REDHAT_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.needs-version && format('APP_VERSION={0}', env.APP_VERSION) || '' }}
          tags: |
            ${{ env.QUAY_REGISTRY }}/${{ env.QUAY_NAMESPACE }}/${{ matrix.image }}:${{ env.RELEASE_TAG }}
            ${{ env.QUAY_REGISTRY }}/${{ env.QUAY_NAMESPACE }}/${{ matrix.image }}:latest

  publish-release:
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        run: |
          source scripts/lib/version.sh
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${VERSION_V}" >> "$GITHUB_ENV"
          fi
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Package Helm chart
        run: helm package helm/gateforge --destination docs/

      - name: Update Helm repo index
        run: |
          source scripts/lib/helm-repo-url.sh
          helm repo index docs/ --url "${HELM_REPO_URL}"

      - name: Publish Helm chart via pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No Helm chart changes to publish."
            exit 0
          fi
          BRANCH="chore/helm-chart-${{ env.RELEASE_TAG }}"
          git checkout -b "${BRANCH}"
          git commit -m "chore: publish Helm chart ${{ env.RELEASE_TAG }}"
          git push origin "${BRANCH}"
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore: publish Helm chart ${{ env.RELEASE_TAG }}" \
            --body "Automated Helm repository update for release ${{ env.RELEASE_TAG }}."

      - name: Prepare release notes
        run: |
          source scripts/lib/version.sh
          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"
          if [ -f CHANGELOG.md ] && grep -q "^## \[${VERSION}\]" CHANGELOG.md; then
            sed -n "/^## \[${VERSION}\]/,/^## \[/p" CHANGELOG.md | sed '$d' > "${NOTES_FILE}"
          else
            echo "Release ${VERSION_V}" > "${NOTES_FILE}"
          fi
          echo "NOTES_FILE=${NOTES_FILE}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ env.RELEASE_TAG }}" 2>/dev/null \
            && gh release edit "${{ env.RELEASE_TAG }}" --notes-file "${{ env.NOTES_FILE }}" \
            || gh release create "${{ env.RELEASE_TAG }}" --title "${{ env.RELEASE_TAG }}" --notes-file "${{ env.NOTES_FILE }}"
