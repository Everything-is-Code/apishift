{{- if .Values.datagrid.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "apishift.datagridHeadless" . }}
  labels:
    {{- include "apishift.datagridLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - port: 11222
      targetPort: hotrod
      protocol: TCP
      name: hotrod
    - port: {{ .Values.datagrid.jgroups.port }}
      targetPort: jgroups
      protocol: TCP
      name: jgroups
  selector:
    {{- include "apishift.datagridSelectorLabels" . | nindent 4 }}
{{- end }}
